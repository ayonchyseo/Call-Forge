# Render Blueprint — deploys the whole CallForge app (frontend + AI-call backend)
# as ONE service with a public URL Twilio can reach.
#
# Steps:
#   1. Push this repo to GitHub.
#   2. Render dashboard → New → Blueprint → pick this repo. Render reads this file.
#   3. When it's live, open the service URL (https://<name>.onrender.com) — that's
#      your full app. Then in ⚙ Settings add your OpenAI + Twilio keys.
#
# PUBLIC_URL is auto-derived from Render's RENDER_EXTERNAL_URL, so you don't set it.
#
# DURABLE ACCOUNTS: this blueprint also provisions a managed Postgres database
# (the `databases:` block below) and injects its connection string as
# DATABASE_URL. That means user accounts + admin approvals survive restarts,
# redeploys, and free-tier spin-downs — without it, they live in an ephemeral
# file that Render wipes, which deletes everyone's login on every restart.
databases:
  - name: callforge-db
    plan: free
    databaseName: callforge
    user: callforge

services:
  - type: web
    name: callforge
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Keeps login sessions valid across restarts. Render generates a random value.
      - key: JWT_SECRET
        generateValue: true
      # ── Accounts & admin approval ─────────────────────────────────────────────
      # Durable account storage — connection string injected from the Postgres
      # database provisioned above. The app uses Postgres automatically when this
      # is set (see server/store.js), so accounts/approvals are no longer wiped.
      - key: DATABASE_URL
        fromDatabase:
          name: callforge-db
          property: connectionString
      # First admin (who approves everyone else). Change the password!
      # If unset, a default admin is created and printed in the deploy logs.
      # - key: ADMIN_EMAIL
      #   sync: false
      # - key: ADMIN_PASSWORD
      #   sync: false
      # Optional — set your keys here instead of in the app's Settings.
      # In the Render dashboard these stay secret (sync: false).
      # - key: OPENAI_API_KEY
      #   sync: false
      # - key: TWILIO_ACCOUNT_SID
      #   sync: false
      # - key: TWILIO_AUTH_TOKEN
      #   sync: false
      # - key: TWILIO_FROM_NUMBER
      #   sync: false
